<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Microelectronics in Austria – Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  html, body { margin: 0; height: 100%; font-family: "Segoe UI", Arial, sans-serif; }
  #map { position: absolute; inset: 0; }
  .title {
    position: absolute; top: 12px; left: 50px; z-index: 1000;
    background: rgba(255,255,255,.92); padding: 8px 14px; border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,.3); font-weight: 700; font-size: 17px;
  }
  .title small { display:block; font-weight: 400; font-size: 12px; color:#555; }
  .legend {
    line-height: 1.5; background: rgba(255,255,255,.94); padding: 10px 12px;
    border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.3); font-size: 13px;
  }
  .legend b { display:block; margin-bottom: 6px; }
  .legend .row { cursor: pointer; user-select: none; }
  .legend .row.off { opacity: .35; text-decoration: line-through; }
  .legend i { width: 12px; height: 12px; display:inline-block; margin-right: 7px;
               border-radius: 50%; vertical-align: middle; border: 1px solid #333; }
  .leaflet-popup-content { font-size: 13px; }
  .leaflet-popup-content b { font-size: 14px; }
  /* Tone down the basemap so markers stand out */
  .leaflet-tile-pane { filter: saturate(.55) brightness(1.03); }
</style>
</head>
<body>
<div class="title">Microelectronics in Austria
  <small>Companies, research &amp; institutions · editable via <code>data.js</code></small>
  <small>&copy; 2026 Harald Pretl, Johannes Kepler University, Linz, Austria</small>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="data.js"></script>
<script>
  const map = L.map('map', { scrollWheelZoom: true }).setView([47.6, 14.2], 7);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  // Group companies by city, ordered west→east (matching SVG numbering)
  const cityMap = {};
  COMPANIES.forEach(f => {
    if (!cityMap[f.city]) cityMap[f.city] = { state: f.state, companies: [] };
    cityMap[f.city].companies.push(f);
  });
  const cityOrder = Object.keys(cityMap).sort((a, b) => {
    const avgLon = g => g.companies.reduce((s, c) => s + c.lon, 0) / g.companies.length;
    return avgLon(cityMap[a]) - avgLon(cityMap[b]);
  });

  // Active category filter
  const activeCategories = new Set(Object.keys(CATEGORIES));
  const cityMarkers = {};

  function cityIcon(n) {
    return L.divIcon({
      className: '',
      html: `<div style="width:24px;height:24px;border-radius:50%;background:#1d3b57;
                         border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.5);
                         color:#fff;font-weight:700;font-size:11px;line-height:20px;
                         text-align:center">${n}</div>`,
      iconSize: [24,24], iconAnchor: [12,12], popupAnchor: [0,-12]
    });
  }

  function buildPopup(city) {
    const data = cityMap[city];
    let html = `<b style="font-size:15px">${city}</b> `
             + `<span style="color:#789;font-size:12px">${data.state}</span>`
             + `<hr style="margin:5px 0">`;
    data.companies.forEach(f => {
      const cat = CATEGORIES[f.category] || { color: '#888', label: f.category };
      const name = f.web
        ? `<a href="${f.web}" target="_blank" rel="noopener" style="color:#1d3b57">${f.name}</a>`
        : f.name;
      const note = f.note ? ` <i style="color:#a15;font-size:11px">(${f.note})</i>` : '';
      html += `<div style="margin:3px 0;${activeCategories.has(f.category)?'':'opacity:.35'}">
                 <span style="color:${cat.color};font-size:15px">●</span> ${name}${note}
               </div>`;
    });
    return html;
  }

  function updateMarkers() {
    for (const city in cityMarkers) {
      const { marker, data } = cityMarkers[city];
      const visible = data.companies.some(c => activeCategories.has(c.category));
      if (visible) { if (!map.hasLayer(marker)) map.addLayer(marker); }
      else map.removeLayer(marker);
    }
  }

  const bounds = [];
  cityOrder.forEach((city, idx) => {
    const data = cityMap[city];
    const avgLat = data.companies.reduce((s, c) => s + c.lat, 0) / data.companies.length;
    const avgLon = data.companies.reduce((s, c) => s + c.lon, 0) / data.companies.length;
    const n = data.companies.length;
    const marker = L.marker([avgLat, avgLon], { icon: cityIcon(n), title: city }).addTo(map);
    marker.bindPopup(() => buildPopup(city), { maxWidth: 400 });
    marker.bindTooltip(`<b>${city}</b> · ${data.companies.length} entr${data.companies.length===1?'y':'ies'}`,
                       { direction: 'top', offset: [0,-12] });
    cityMarkers[city] = { marker, data };
    bounds.push([avgLat, avgLon]);
  });
  if (bounds.length) map.fitBounds(bounds, { padding: [40,40] });

  // Legend with click filter
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    let html = '<b>Categories (click to filter)</b>';
    for (const key in CATEGORIES) {
      const k = CATEGORIES[key];
      html += `<div class="row" data-key="${key}"><i style="background:${k.color}"></i>${k.label}</div>`;
    }
    div.innerHTML = html;
    L.DomEvent.disableClickPropagation(div);
    div.querySelectorAll('.row').forEach(row => {
      row.addEventListener('click', () => {
        const key = row.dataset.key;
        if (activeCategories.has(key)) { activeCategories.delete(key); row.classList.add('off'); }
        else { activeCategories.add(key); row.classList.remove('off'); }
        updateMarkers();
      });
    });
    return div;
  };
  legend.addTo(map);
</script>
</body>
</html>
