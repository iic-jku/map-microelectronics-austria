name: Build & Deploy Map

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate SVG map
        run: python3 generate_svg.py

      - name: Assemble site
        run: |
          mkdir -p _site
          cp map.html _site/index.html
          cp data.js _site/data.js
          cp microelectronics_austria.svg _site/microelectronics_austria.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
